<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 | Personal Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 背景装饰元素：创建毛玻璃效果的深度感 -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- 主容器：采用毛玻璃效果的核心卡片 -->
    <main class="glass-card">
        <!-- 头部区域：包含头像和基本信息 -->
        <header class="profile-header">
            <!-- 头像容器：带有柔和阴影和边框 -->
            <div class="avatar-container">
                <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Felix" alt="用户头像" class="avatar">
            </div>
            
            <!-- 姓名和职位信息 -->
            <div class="info-section">
                <h1 class="name">张三</h1>
                <p class="title">全栈开发工程师</p>
                <p class="location">📍 北京，中国</p>
            </div>
        </header>

        <!-- 关于我部分：简洁的自我介绍 -->
        <section class="about-section">
            <h2 class="section-title">关于我</h2>
            <p class="about-text">
                热爱技术，追求极致用户体验。专注于前端开发与交互设计，
                善于将复杂问题简化为优雅的解决方案。工作之余喜欢摄影、阅读和探索新技术。
            </p>
        </section>

        <!-- 技能标签：展示核心技术栈 -->
        <section class="skills-section">
            <h2 class="section-title">技术栈</h2>
            <div class="skills-container">
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">TypeScript</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Vue.js</span>
                <span class="skill-tag">Node.js</span>
                <span class="skill-tag">Python</span>
                <span class="skill-tag">CSS3</span>
                <span class="skill-tag">HTML5</span>
            </div>
        </section>

        <!-- 联系方式：社交链接和联系按钮 -->
        <section class="contact-section">
            <h2 class="section-title">联系我</h2>
            <div class="social-links">
                <a href="#" class="social-link" aria-label="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-1.334-.727-.933-.727-1.756-.727-1.756 0-1.18.902-2.143 2.09-2.418.593-.122 1.195-.094 1.795-.094 1.076 0 2.165.107 3.245.321.365-.907.942-1.605 1.698-2.173-2.665-.305-5.467-1.334-5.467-1.334-.727-.933-.727-1.756-.727-1.756 0-1.18.902-2.143 2.09-2.418.593-.122 1.195-.094 1.795-.094 1.076 0 2.165.107 3.245.321.365-.907.942-1.605 1.698-2.173zM12 22c-5.523 0-10-4.477-10-10s4.477-10 10-10 10 4.477 10 10-4.477 10-10 10z"/>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
                <a href="#" class="social-link" aria-label="Twitter">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                    </svg>
                </a>
                <a href="mailto:example@email.com" class="social-link" aria-label="Email">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/>
                    </svg>
                </a>
            </div>
        </section>

        <!-- 行动号召按钮 -->
        <footer class="cta-footer">
            <a href="#" class="btn-primary">下载简历</a>
            <a href="#" class="btn-secondary">查看项目</a>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
